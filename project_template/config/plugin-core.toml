[plugin.core.jwt]
# These are the defaults for the JWT tokens.
# PLEASE CHANGE THE SECRET!
algorithm = "HS256"
secret = "CHANGE_ME_DAMMIT"
token_expire_minutes = 30
# 7 days in minutes.
refresh_expire_minutes = 10080

[plugin.core.crypt]
# these key-values are passed verbatim to passlib.contxt.CryptContext()
schemes = ["argon2", "sha512_crypt", "plaintext"]
deprecated = ["sha512_crypt", "plaintext"]
